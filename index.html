<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="prof/cover.jpg">
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="js/index.js"></script>
  <title>2026portfolio</title>
</head>
<body>
  <style>
.prof{
  margin: 0px;
  padding: 0px;
  width: 100%;
}

.cover-photo{
  width: 100%;
  height: 40vh;
  object-fit: cover;
}
.profile-photo{
  width:150px;
  height:150px;
  border-radius:50%;
  object-fit: cover;
  margin:auto;
  display:block;
  position:relative;
  bottom:100px;
  border:4px solid #0f172a;
}
  </style>
  <div class="prof">
    <img class="cover-photo" src="prof/cover.jpg" oncontextmenu="return false;">
 <img class="profile-photo" src="prof/cover.jpg" oncontextmenu="return false;">
</div>
<header>

  <h1>Kenneth Barinas</h1>
  <p>Available for Freelance</p>
  <p>My Portfolio</p>
</header>

<section class="games">
  <h2>My Project</h2>

  <div class="game-grid" id="output">


  </div>


<footer>
  <p>© 2025 Kenneth | Game Developer</p>
</footer>
<script type="module">

let project =[{"img":"img/pw1.jpg","name":"ChatWeb","techStock":"Vuejs,PHP","intro":"A chatbox website that allow user to send message in realtime."},{"img":"img/shape.jpg","name":"Shape Prediction API","techStock":"html,Django","intro":"A shape prediction API using a CNN model."},{"img":"img/hunt.jpg","name":"Animal Hunting","techStock":"Python","intro":"Start hunt animals for coins."},{"img":"img/pokeMo.jpg","name":"pokeMo","techStock":"Python","intro":"Come and catch pokemon."}]
const output = document.getElementById("output");
project.forEach(function(project){
output.innerHTML += `  <div class="game-card">      <img src='${project.img.trim()}'alt='${project.img}'><h3>${project.name}</h3><p>${project.intro}</p><span>${project.techStock}</span>      <div class="likeView"><button class="btnLike" data-btnprog_name='${project.name}'><i class="fa fa-thumbs-up"></i><p class="likeVal" id="like-${project.name}">0</p></button><button ><i class="fa fa-eye"></i><p id="numbView">0</p></button></div>
      <a href="#" class="play-btn">View Documentation</a></div>`;  
});


const btnLike = document.querySelectorAll(".btnLike");
 
btnLike.forEach(button => {
  const project = button.dataset.btnprog_name;

  let likes = parseInt(localStorage.getItem(project)) || 0;
//localStorage.removeItem(project);
  const likeDisplay = document.getElementById(`like-${project}`);
  likeDisplay.textContent = likes;

  button.addEventListener("click", () => {
    likes++;
    localStorage.setItem(project, likes);
    likeDisplay.textContent = likes;
    
  });
});


</script>
</body>
  </html>
